
info:
  title: Argent Bank Transaction API
  description: API proposal for user transactions (list by month grouped by account, details, edit metadata)
  version: "2.0.0"

servers:
  - url: http://localhost:3001/api/v2

tags:
  - name: Transaction module
    description: Endpoints for listing, viewing and editing transaction metadata

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        message:
          type: string
          example: Invalid month format

    Transaction:
      type: object
      description: Transaction core fields + editable metadata
      properties:
        id:
          type: string
          example: tx_123
        accountId:
          type: string
          example: acc_001
        date:
          type: string
          format: date
          example: "2026-03-02"
        amount:
          type: number
          example: 49.99
        description:
          type: string
          example: Grocery Store
        category:
          type: string
          nullable: true
          description: Editable category (metadata)
          example: Food
        notes:
          type: string
          nullable: true
          description: Editable notes (metadata)
          example: "Bought snacks"

    AccountTransactions:
      type: object
      properties:
        accountId:
          type: string
          example: acc_001
        accountName:
          type: string
          example: Checking
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"

    TransactionsGroupedByAccountBody:
      type: object
      properties:
        month:
          type: string
          description: Month in YYYY-MM
          example: "2026-03"
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/AccountTransactions"

    TransactionsGroupedByAccountResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: User transactions retrieved successfully
        body:
          $ref: "#/components/schemas/TransactionsGroupedByAccountBody"

    TransactionResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        message:
          type: string
          example: Transaction retrieved successfully
        body:
          $ref: "#/components/schemas/Transaction"

    UpdateTransactionInfoRequest:
      type: object
      description: Fields editable by the user (metadata only)
      additionalProperties: false
      properties:
        category:
          type: string
          nullable: true
          description: New category (set null to remove)
          example: Food
        notes:
          type: string
          nullable: true
          description: New notes (set null to remove)
          example: "Restaurant with friends"

paths:
  /user/transactions:
    get:
      tags:
        - Transaction module
      summary: List transactions for a month, grouped by account
      description: >
        Returns all transactions for the requested month (default: current month),
        grouped by account. Transactions are not created/deleted here.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: month
          required: false
          schema:
            type: string
            example: "2026-03"
          description: Month in YYYY-MM format. If omitted, current month is used.
        - in: query
          name: accountId
          required: false
          schema:
            type: string
            example: "acc_001"
          description: Optional filter to return transactions for a single account.
      responses:
        "200":
          description: User transactions retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsGroupedByAccountResponse"
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/transactions/{transactionId}:
    get:
      tags:
        - Transaction module
      summary: Get transaction details
      description: Returns details for a single transaction (core fields + editable metadata).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
            example: "tx_123"
          description: Transaction id
      responses:
        "200":
          description: Transaction retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags:
        - Transaction module
      summary: Update editable transaction info (category, notes)
      description: >
        Partially updates editable fields only (category, notes).
        This endpoint does NOT create or delete a transaction.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
            example: "tx_123"
      requestBody:
        required: true
        description: Editable transaction metadata to update
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionInfoRequest"
      responses:
        "200":
          description: Transaction updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"